<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0B2A4A">
<title>منصة دعم التحصيل الدراسي والفاعلية الجماعية للمعلمين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#0B2A4A; --navy-2:#143B66; --navy-3:#0E5A82;
  --teal:#0E7C7B; --teal-dark:#0A5C5B;
  --gold:#B8860B; --gold-light:#E9C46A;
  --bg:#F3F5F8; --surface:#FFFFFF; --surface-2:#FAFBFC;
  --text:#1E2A38; --muted:#6B7686; --border:#E1E6ED;
  --success:#1F8A55; --success-bg:#E8F5EE;
  --pending:#B45309; --pending-bg:#FDF1E0;
  --danger:#B91C1C; --danger-bg:#FBE9E9;
  --draft:#5B6472; --draft-bg:#EDEFF2;
  --radius:10px;
  --shadow:0 1px 2px rgba(11,42,74,.06), 0 6px 18px rgba(11,42,74,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px; line-height:1.65;
  min-height:100vh;
}
h1,h2,h3,h4{ font-family:'IBM Plex Sans Arabic',sans-serif; font-weight:700; margin:0; color:var(--navy); }
.mono{ font-family:'JetBrains Mono',monospace; direction:ltr; unicode-bidi:embed; }
button{ font-family:inherit; cursor:pointer; }
input,select,textarea{ font-family:inherit; font-size:14.5px; }
a{ color:var(--teal-dark); }
::selection{ background:var(--gold-light); }

/* ---------- layout shells ---------- */
#app{min-height:100vh;}
.center-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }

/* ---------- login ---------- */
.login-card{
  width:100%; max-width:430px; background:var(--surface);
  border-radius:16px; box-shadow:var(--shadow); padding:36px 32px 28px;
  border:1px solid var(--border); position:relative; overflow:hidden;
}
.login-card::before{
  content:""; position:absolute; inset:0 0 auto 0; height:6px;
  background:linear-gradient(90deg,var(--navy),var(--teal),var(--gold));
}
.brand{ display:flex; align-items:center; gap:12px; margin-bottom:6px; }
.brand-mark{ width:64px; height:64px; flex:none; object-fit:contain; }
.brand-title{ font-size:15px; font-weight:800; color:var(--navy); line-height:1.3;}
.brand-sub{ font-size:12px; color:var(--muted); }
.login-h{ font-size:20px; margin:18px 0 4px; }
.login-p{ color:var(--muted); font-size:13.5px; margin-bottom:20px; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:13px; color:var(--navy-2); font-weight:700; margin-bottom:6px; }
.input,select.input,textarea.input{
  width:100%; padding:11px 13px; border:1.5px solid var(--border); border-radius:8px;
  background:var(--surface-2); color:var(--text); transition:.15s;
}
.input:focus,select.input:focus,textarea.input:focus{ outline:none; border-color:var(--teal); background:#fff; box-shadow:0 0 0 3px rgba(14,124,123,.12); }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:8px; padding:11px 18px; font-weight:700; font-size:14px; transition:.15s; }
.btn-primary{ background:var(--navy); color:#fff; }
.btn-primary:hover{ background:var(--navy-2); }
.btn-block{ width:100%; }
.btn-gold{ background:var(--gold); color:#fff; }
.btn-gold:hover{ background:#9c7209; }
.btn-ghost{ background:transparent; color:var(--navy); border:1.5px solid var(--border); }
.btn-ghost:hover{ background:var(--surface-2); }
.btn-danger{ background:#fff; color:var(--danger); border:1.5px solid #f0c4c4; }
.btn-danger:hover{ background:var(--danger-bg); }
.btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:7px; }
.hint-box{ margin-top:18px; padding:12px 14px; background:var(--surface-2); border:1px dashed var(--border); border-radius:8px; font-size:12.5px; color:var(--muted); }
.hint-box b{ color:var(--navy-2); }
.error-text{ color:var(--danger); font-size:13px; margin:-4px 0 10px; }

/* ---------- top nav ---------- */
.topnav{
  background:var(--navy); color:#fff; padding:0 20px; height:62px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  position:sticky; top:0; z-index:30; box-shadow:0 2px 10px rgba(0,0,0,.12);
}
.topnav-brand{ display:flex; align-items:center; gap:10px; }
.topnav-title{ font-family:'IBM Plex Sans Arabic'; font-weight:700; font-size:15.5px; }
.topnav-title small{ display:block; font-family:'IBM Plex Sans Arabic'; font-weight:400; font-size:11px; color:#B9C6D6; }
.topnav-right{ display:flex; align-items:center; gap:10px; }
.user-pill{ display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.08); padding:6px 12px; border-radius:30px; font-size:13px; }
.user-pill .role-tag{ background:var(--gold); color:#1d1300; font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:20px; }
.icon-btn{ background:rgba(255,255,255,.08); border:none; color:#fff; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; position:relative; }
.icon-btn:hover{ background:rgba(255,255,255,.18); }
.icon-btn svg{ width:17px; height:17px; }
.notif-wrap{ position:relative; }
.notif-badge{ position:absolute; top:-3px; left:-3px; background:var(--danger); color:#fff; font-size:10px; font-weight:800; min-width:16px; height:16px; line-height:16px; border-radius:8px; text-align:center; padding:0 4px; }
.notif-panel{ position:absolute; top:48px; left:0; width:340px; max-width:90vw; background:#fff; color:var(--text); border-radius:12px; box-shadow:0 16px 40px rgba(0,0,0,.28); z-index:70; overflow:hidden; }
.notif-panel-head{ display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--border); }
.notif-panel-head h4{ font-size:14px; }
.notif-list{ max-height:380px; overflow-y:auto; }
.notif-item{ padding:11px 14px; border-bottom:1px solid var(--border); font-size:13px; cursor:pointer; }
.notif-item:hover{ background:var(--surface-2); }
.notif-item.unread{ background:#EFF6FB; }
.notif-item .ntitle{ font-weight:800; margin-bottom:2px; color:var(--navy); }
.notif-item .nbody{ color:var(--text); font-size:12.5px; line-height:1.5; }
.notif-item .nmeta{ color:var(--muted); font-size:11px; margin-top:5px; }
.notif-empty{ padding:24px 14px; text-align:center; color:var(--muted); font-size:13px; }
.notif-type-tag{ display:inline-block; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:10px; margin-bottom:5px; }
.notif-type-meeting{ background:#E8F0FB; color:var(--navy-3); }
.notif-type-submission{ background:var(--pending-bg); color:var(--pending); }
.notif-type-demo{ background:#F1E9FB; color:#6B2FB8; }
.notif-type-general{ background:var(--surface-2); color:var(--muted); }

.shell{ max-width:1180px; margin:0 auto; padding:24px 20px 60px; }

/* ---------- kpis ---------- */
.kpi-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.kpi-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); }
.kpi-card .v{ font-family:'JetBrains Mono'; font-size:28px; font-weight:700; color:var(--navy); }
.kpi-card .l{ font-size:12.5px; color:var(--muted); margin-top:2px; }
.kpi-card.accent-pending .v{ color:var(--pending); }
.kpi-card.accent-success .v{ color:var(--success); }
.kpi-card.accent-danger .v{ color:var(--danger); }

@media (max-width:760px){ .kpi-grid{ grid-template-columns:repeat(2,1fr);} }

/* ---------- section header ---------- */
.section-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:30px 0 14px; flex-wrap:wrap; }
.section-head h2{ font-size:17px; }
.tabs{ display:flex; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:4px; }
.tab{ padding:7px 14px; border-radius:6px; font-size:13px; font-weight:700; color:var(--muted); background:transparent; border:none; }
.tab.active{ background:var(--navy); color:#fff; }

/* ---------- table ---------- */
.table-wrap{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.table-scroll{ overflow-x:auto; }
table.list{ width:100%; border-collapse:collapse; min-width:640px; }
table.list th{ text-align:right; font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface-2); }
table.list td{ padding:13px 16px; border-bottom:1px solid var(--border); font-size:13.5px; vertical-align:middle; }
table.list tr:last-child td{ border-bottom:none; }
table.list tr:hover td{ background:#FAFCFE; }
.empty-row td{ text-align:center; color:var(--muted); padding:34px; }

.badge{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:20px; }
.badge::before{ content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.badge.draft{ background:var(--draft-bg); color:var(--draft); }
.badge.pending{ background:var(--pending-bg); color:var(--pending); }
.badge.approved{ background:var(--success-bg); color:var(--success); }
.badge.returned{ background:var(--danger-bg); color:var(--danger); }

.row-actions{ display:flex; gap:6px; justify-content:flex-end; }

/* ---------- form picker ---------- */
.card-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
@media (max-width:900px){ .card-grid{ grid-template-columns:repeat(2,1fr);} }
@media (max-width:600px){ .card-grid{ grid-template-columns:1fr;} }
.form-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); cursor:pointer; transition:.15s; position:relative; }
.form-card:hover{ transform:translateY(-2px); border-color:var(--teal); }
.form-card .num{ position:absolute; left:14px; top:14px; font-family:'JetBrains Mono'; font-size:11px; color:var(--muted); background:var(--surface-2); padding:2px 8px; border-radius:20px; }
.form-card .ic{ width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:10px; }
.form-card h3{ font-size:14.5px; margin-bottom:4px; }
.form-card p{ font-size:12.5px; color:var(--muted); margin:0; }
.form-card .tag{ display:inline-block; margin-top:10px; font-size:11px; font-weight:700; color:var(--teal-dark); background:#EAF6F5; padding:3px 9px; border-radius:20px; }
.new-tag{ background:#FDF1E0; color:var(--pending); }

/* ---------- form sheet ---------- */
.sheet-wrap{ max-width:920px; margin:0 auto; }
.sheet-bar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.sheet-bar .left{ display:flex; align-items:center; gap:10px; }
.form-sheet{
  background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow);
  padding:30px 34px; position:relative;
}
.sheet-header{ display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--navy); padding-bottom:16px; margin-bottom:22px; }
.sheet-header .titles h1{ font-size:19px; }
.sheet-header .titles .sub{ color:var(--muted); font-size:12.5px; margin-top:3px; }
.sheet-header .form-no{ font-family:'JetBrains Mono'; font-size:12px; color:#fff; background:var(--navy); padding:5px 12px; border-radius:7px; white-space:nowrap; }

.field-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:18px; }
.field-grid.cols-2{ grid-template-columns:repeat(2,1fr); }
.field-grid.cols-4{ grid-template-columns:repeat(4,1fr); }
@media (max-width:700px){ .field-grid, .field-grid.cols-2, .field-grid.cols-4{ grid-template-columns:1fr; } }

.block-title{ font-size:13.5px; font-weight:800; color:var(--navy-2); margin:22px 0 10px; display:flex; align-items:center; gap:8px; }
.block-title .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); }

.checkbox-group{ display:flex; flex-wrap:wrap; gap:8px; }
.chk{ display:flex; align-items:center; gap:6px; background:var(--surface-2); border:1.3px solid var(--border); border-radius:20px; padding:6px 13px; font-size:12.5px; cursor:pointer; user-select:none; }
.chk input{ accent-color:var(--teal); }
.chk.checked{ background:#EAF6F5; border-color:var(--teal); color:var(--teal-dark); font-weight:700; }

.dyn-table{ width:100%; border-collapse:collapse; margin-bottom:10px; }
.dyn-table th{ font-size:11.5px; color:var(--muted); text-align:right; padding:7px 8px; border-bottom:1.5px solid var(--border); }
.dyn-table td{ padding:6px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
.dyn-table input, .dyn-table textarea{ width:100%; }
.dyn-table .rmv{ background:none; border:none; color:var(--danger); font-size:16px; padding:2px 6px;}
.add-row-btn{ font-size:12.5px; font-weight:700; color:var(--teal-dark); background:#EAF6F5; border:1px dashed var(--teal); padding:7px 14px; border-radius:8px; }

.session-card{ border:1.5px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; background:var(--surface-2); position:relative; }
.session-card .session-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.session-card .session-head .ttl{ font-weight:700; font-size:13px; color:var(--navy-2); }

textarea.input{ resize:vertical; min-height:64px; }

.sig-box{ border:1.5px dashed var(--border); border-radius:10px; padding:10px; background:var(--surface-2); }
.sig-box canvas{ width:100%; height:120px; background:#fff; border-radius:7px; touch-action:none; border:1px solid var(--border); }
.sig-actions{ display:flex; justify-content:space-between; margin-top:8px; align-items:center; }
.sig-name{ font-size:12px; color:var(--muted); }
.sig-img{ max-height:70px; }
.signed-chip{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--success); background:var(--success-bg); padding:5px 11px; border-radius:20px; }

.sig-footer{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:26px; padding-top:18px; border-top:1.5px dashed var(--border); }
@media (max-width:700px){ .sig-footer{ grid-template-columns:1fr; } }
.sig-footer .who{ font-size:12.5px; font-weight:700; color:var(--navy-2); margin-bottom:6px; }

.upload-note{ font-size:12px; color:var(--muted); background:var(--surface-2); border:1px dashed var(--border); border-radius:8px; padding:9px 11px; }

.evidence-grid{ display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
.evidence-thumb{ position:relative; width:84px; height:84px; border-radius:8px; overflow:hidden; border:1.5px solid var(--border); }
.evidence-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.evidence-thumb .rmv-ev{ position:absolute; top:2px; left:2px; background:rgba(185,28,28,.9); color:#fff; border:none; width:20px; height:20px; border-radius:50%; font-size:12px; line-height:1; }
.evidence-add{ width:84px; height:84px; border-radius:8px; border:1.5px dashed var(--teal); background:#EAF6F5; color:var(--teal-dark); display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; }

.task-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 18px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.task-card .meta b{ display:block; font-size:14px; color:var(--navy-2); margin-bottom:3px; }
.task-card .meta span{ font-size:12.5px; color:var(--muted); }

.program-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:22px; overflow:hidden; }
.program-card .ph{ padding:16px 18px; border-bottom:1px solid var(--border); background:var(--surface-2); }
.program-card .ph h3{ font-size:15.5px; color:var(--navy); margin-bottom:3px; }
.program-card .ph p{ font-size:12.5px; color:var(--muted); }
.ind-row{ padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap; }
.ind-row:last-child{ border-bottom:none; }
.ind-row .ind-main{ flex:1; min-width:240px; }
.ind-row .ind-main .lbl{ font-size:13.5px; color:var(--ink); font-weight:600; margin-bottom:5px; }
.ind-row .ind-main .sub{ font-size:11.5px; color:var(--muted); line-height:1.7; }
.ind-row .ind-side{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; min-width:160px; }
.prog-bar{ width:140px; height:7px; border-radius:6px; background:var(--surface-2); overflow:hidden; border:1px solid var(--border); }
.prog-bar > i{ display:block; height:100%; background:var(--success); }
.prog-txt{ font-size:11px; color:var(--muted); font-family:'JetBrains Mono'; }
.settings-bar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:18px; }
.settings-bar label{ font-size:12.5px; color:var(--muted); font-weight:700; }
.settings-bar input{ border:1px solid var(--border); border-radius:7px; padding:6px 10px; font-size:13px; font-family:inherit; }

.stamp{
  position:absolute; left:34px; top:90px; width:118px; height:118px; border-radius:50%;
  border:3px solid var(--gold); display:flex; align-items:center; justify-content:center; text-align:center;
  transform:rotate(-14deg); color:var(--gold); opacity:.92; pointer-events:none;
  background:repeating-radial-gradient(circle, transparent 0 96%, rgba(184,134,11,.07) 97%);
}
.stamp::before{ content:""; position:absolute; inset:7px; border:1.5px solid var(--gold); border-radius:50%; }
.stamp .txt{ font-family:'IBM Plex Sans Arabic'; font-weight:700; font-size:13px; line-height:1.3; }
.stamp .sm{ font-size:8.5px; font-family:'JetBrains Mono'; margin-top:3px; }
@keyframes stampIn{ 0%{ transform:rotate(-14deg) scale(2.4); opacity:0;} 60%{ opacity:1;} 100%{ transform:rotate(-14deg) scale(1); opacity:.92;} }
.stamp.animate{ animation:stampIn .45s ease-out; }

.status-strip{ display:flex; align-items:center; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.step{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
.step .c{ width:22px; height:22px; border-radius:50%; background:var(--draft-bg); color:var(--draft); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
.step.done .c{ background:var(--success); color:#fff; }
.step.now .c{ background:var(--navy); color:#fff; }
.step-sep{ width:26px; height:2px; background:var(--border); }

.return-note{ background:var(--danger-bg); border:1px solid #f0c4c4; border-radius:9px; padding:12px 14px; font-size:13px; color:#7a1414; margin-bottom:18px; }
.return-note b{ display:block; margin-bottom:3px; }

.review-panel{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; position:sticky; top:80px; }
.review-panel h3{ font-size:14.5px; margin-bottom:12px; }
.review-grid{ display:grid; grid-template-columns:1fr; gap:10px; }

.modal-bg{ position:fixed; inset:0; background:rgba(11,26,42,.55); display:flex; align-items:center; justify-content:center; z-index:60; padding:20px; }
.modal-box{ background:#fff; border-radius:14px; padding:24px; max-width:440px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,.25); }
.modal-box h3{ font-size:16px; margin-bottom:6px; }
.modal-box p{ color:var(--muted); font-size:13px; margin-bottom:16px; }
.modal-actions{ display:flex; gap:10px; margin-top:16px; }

.toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:12px 22px; border-radius:30px; font-size:13.5px; font-weight:700; box-shadow:0 10px 30px rgba(0,0,0,.2); z-index:80; }

.layout-2col{ display:grid; grid-template-columns:1fr 300px; gap:20px; align-items:start; }
@media (max-width:900px){ .layout-2col{ grid-template-columns:1fr; } }

/* ---------- print ---------- */
@media print{
  body{ background:#fff; }
  .no-print{ display:none !important; }
  .shell{ padding:0; max-width:none; }
  .form-sheet{ box-shadow:none; border:none; padding:0; }
  .sheet-wrap{ max-width:none; }
}
.footer-note{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:30px; }
</style>
</head>
<body>
<div id="app"></div>

<script>

/* SQL_SCHEMA (نفّذها في SQL Editor داخل Supabase عند التفعيل):
   المصادقة حقيقية عبر Supabase Auth (auth.users)؛ profiles.id يطابق auth.users.id،
   ويُستخدم بريد وهمي ثابت بصيغة <username>@nasmo.local تلقائيًا من الكود.

drop table if exists notifications;
drop table if exists submissions;
drop table if exists indicator_status;
drop table if exists app_settings;
drop table if exists profiles;
drop table if exists communities;

create table communities (
  id uuid primary key default gen_random_uuid(),
  school text not null,
  name text not null,
  meeting_day text,
  meeting_time text,
  created_at timestamptz default now()
);

create table profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  username text unique not null,
  full_name text not null,
  role text not null check (role in ('coordinator','principal','teacher','admin')),
  school text not null,
  community_id uuid references communities(id),
  specialty text,
  phone text,
  created_at timestamptz default now()
);

create table notifications (
  id uuid primary key default gen_random_uuid(),
  school text not null,
  sender_id uuid references profiles(id),
  sender_name text,
  target_type text not null check (target_type in ('school','community','user')),
  target_id uuid,
  type text not null default 'general' check (type in ('meeting','submission','demo','general')),
  title text not null,
  body text,
  due_date date,
  read_by jsonb default '[]'::jsonb,
  created_at timestamptz default now()
);

create table submissions (
  id uuid primary key default gen_random_uuid(),
  form_type text not null,
  school text not null,
  created_by uuid references profiles(id),
  created_by_name text,
  payload jsonb not null,
  status text not null default 'draft',
  preparer_signature text,
  principal_signature text,
  principal_comment text,
  submitted_at timestamptz,
  approved_at timestamptz,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);

create table app_settings (
  school text primary key,
  semester_start date
);

create table indicator_status (
  id uuid primary key default gen_random_uuid(),
  school text not null,
  indicator_id text not null,
  done boolean default false,
  done_by text,
  done_at timestamptz,
  unique (school, indicator_id)
);

$$;
create or replace function my_school() returns text language sql security definer stable as $$

function isRemote(){ return !!(CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY); }

/* مصادقة حقيقية عبر Supabase Auth: نربط كل اسم مستخدم ببريد وهمي ثابت
   حتى تعمل واجهة الدخول الحالية (اسم مستخدم/كلمة مرور) دون تغيير،
   بينما تُصدر Supabase جلسة JWT فعلية يميّز بها auth.uid() داخل سياسات RLS. */
let AUTH = { accessToken: null, refreshToken: null };
function authEmailFor(username){ return username.trim().toLowerCase() + '@nasmo.local'; }
function persistAuth(){ sessionStorage.setItem('dtd_auth', JSON.stringify(AUTH)); }
function loadAuth(){ try{ const a = JSON.parse(sessionStorage.getItem('dtd_auth')); if (a) AUTH = a; }catch(e){} }
function clearAuth(){ AUTH = { accessToken:null, refreshToken:null }; sessionStorage.removeItem('dtd_auth'); }
async function refreshAuthToken(){
  if (!AUTH.refreshToken) return false;
  try{
    const res = await fetch(CONFIG.SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
      method: "POST",
      headers: { "apikey": CONFIG.SUPABASE_ANON_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ refresh_token: AUTH.refreshToken })
    });
    if (!res.ok) return false;
    const data = await res.json();
    AUTH.accessToken = data.access_token; AUTH.refreshToken = data.refresh_token;
    persistAuth();
    return true;
  }catch(e){ return false; }
}

async function remoteFetch(path, opts){
  opts = opts || {};
  const doFetch = async function(){
    const headers = {
      "apikey": CONFIG.SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + (AUTH.accessToken || CONFIG.SUPABASE_ANON_KEY),
      "Content-Type": "application/json"
    };
    if (opts.prefer) headers["Prefer"] = opts.prefer;
    return fetch(CONFIG.SUPABASE_URL + "/rest/v1/" + path, {
      method: opts.method || "GET",
      headers: headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
  };
  let res = await doFetch();
  if (res.status === 401 && AUTH.refreshToken){
    if (await refreshAuthToken()) res = await doFetch();
  }
  if (!res.ok) { throw new Error("تعذّر الاتصال بقاعدة البيانات السحابية (" + res.status + ")"); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const TIME_STATUS_BADGE = { upcoming:'draft', inrange:'pending', overdue:'returned', complete:'approved' };

function currentWeekNumber(semesterStart){
  if (!semesterStart) return null;
  const start = new Date(semesterStart);
  const now = new Date();
  const diffDays = Math.floor((now - start) / 86400000);
  if (diffDays < 0) return 0;
  return Math.floor(diffDays / 7) + 1;
}

function indicatorTimeStatus(ind, curWeek, doneCount, targetCount){
  if (targetCount != null && doneCount >= targetCount) return 'complete';
  if (curWeek == null) return 'inrange';
  if (curWeek < ind.weekStart) return 'upcoming';
  if (curWeek > ind.weekEnd) return 'overdue';
  return 'inrange';
}

function indicatorPeriodLabel(ind){
  if (ind.weekLabel) return ind.weekLabel;
  return ind.weekStart === ind.weekEnd ? ('الأسبوع ('+ind.weekStart+')') : ('الأسبوع ('+ind.weekStart+' - '+ind.weekEnd+')');
}

/* ---------------------- تصدير PDF حقيقي (html2canvas + jsPDF) ---------------------- */
async function exportFormToPdf(filename){
  const el = document.querySelector('.form-sheet');
  if (!el || !window.html2canvas || !window.jspdf){ toast('تعذّر تجهيز التصدير، يرجى المحاولة عبر الطباعة.'); return; }
  toast('جارٍ تجهيز ملف PDF...');
  try{
    const canvas = await html2canvas(el, { scale:2, useCORS:true, backgroundColor:'#ffffff' });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'p', unit:'pt', format:'a4' });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    let heightLeft = imgHeight, position = 0;
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
    while (heightLeft > 0){
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }
    pdf.save((filename || 'نموذج') + '.pdf');
  }catch(e){ toast('تعذّر تصدير PDF: ' + e.message); }
}

/* ---------------------- مكوّن التوقيع (Canvas) ---------------------- */
const Pads = {};
function buildSignaturePad(name, existingDataUrl, readonly){
  if (readonly){
    if (existingDataUrl){
      return '<div class="sig-box"><img class="sig-img" src="'+existingDataUrl+'" alt="توقيع"></div>';
    }
    return '<div class="upload-note">لا يوجد توقيع مسجَّل لهذا الحقل.</div>';
  }
  const cid = 'pad_' + name;
  setTimeout(function(){ mountPad(cid, name, existingDataUrl); }, 0);
  return (
    '<div class="sig-box" id="wrap_'+cid+'">' +
      (existingDataUrl ? '<img class="sig-img" src="'+existingDataUrl+'" alt="توقيع محفوظ" style="display:block;margin-bottom:8px;">' : '') +
      '<canvas id="'+cid+'" width="500" height="140"></canvas>' +
      '<div class="sig-actions">' +
        '<span class="sig-name">وقّع بإصبعك أو بالماوس داخل الإطار</span>' +
        '<button type="button" class="btn btn-ghost btn-sm" data-action="clearPad" data-pad="'+cid+'">مسح التوقيع</button>' +
      '</div>' +
    '</div>'
  );
}
function mountPad(cid, name){
  const canvas = document.getElementById(cid);
  if (!canvas || Pads[cid]) return;
  const ctx = canvas.getContext('2d');
  let drawing = false, hasInk = false;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x:(cx-rect.left)*(canvas.width/rect.width), y:(cy-rect.top)*(canvas.height/rect.height) };
  }
  function start(e){ drawing=true; hasInk=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle='#0B2A4A'; ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.stroke(); e.preventDefault(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);
  Pads[cid] = {
    name:name,
    clear:function(){ ctx.clearRect(0,0,canvas.width,canvas.height); hasInk=false; },
    isEmpty:function(){ return !hasInk; },
    toDataUrl:function(){ return hasInk ? canvas.toDataURL('image/png') : null; }
  };
}
function clearPad(cid){ if (Pads[cid]) Pads[cid].clear(); }

function checkboxGroup(name, options, selected){

  }).join('') + '</div>';
}
function radioGroup(name, options, selected){
  return '<div class="checkbox-group">' + options.map(function(opt){
    const checked = selected === opt;
    return '<label class="chk '+(checked?'checked':'')+'"><input type="radio" name="'+name+'" data-action="setRadio" data-group="'+name+'" data-val="'+esc(opt)+'" '+(checked?'checked':'')+'> '+esc(opt)+'</label>';
  }).join('') + '</div>';
}
function inputField(label, name, value, opts){
  opts = opts || {};
  const type = opts.type || 'text';
  const ro = opts.readonly ? 'disabled' : '';
  if (type === 'textarea'){
    return '<div class="field"><label>'+esc(label)+'</label><textarea class="input" data-field="'+name+'" '+ro+' placeholder="'+(opts.placeholder?esc(opts.placeholder):'')+'">'+esc(value||'')+'</textarea></div>';

}

    el.addEventListener('click', async function(){
      const id = el.getAttribute('data-id');
      const n = (State.notifications||[]).find(function(x){ return x.id===id; });
      if (!n) return;
      const readBy = n.read_by || [];
      if (readBy.indexOf(State.user.id) === -1){
        try{ await DB.updateNotification(id, { read_by: readBy.concat([State.user.id]) }); render(); }catch(e){}
      }
    });
  });

  const composeBtn = document.querySelector('[data-action="composeNotif"]');
  if (composeBtn) composeBtn.addEventListener('click', function(){ NotifUI.compose=true; render(); });
  const closeComposeBtn = document.querySelector('[data-action="closeNotifCompose"]');

/* ----- لوحة مدير النظام: إدارة المستخدمين ----- */
let AdminUI = { modalOpen:false, editingId:null, presetCommunityId:null };
function csvEscape(v){
  v = String(v==null?'':v);
  return /[",\n]/.test(v) ? ('"' + v.replace(/"/g,'""') + '"') : v;
}
function toCsv(rows){ return rows.map(function(r){ return r.map(csvEscape).join(','); }).join('\r\n'); }
function parseCsv(text){
  text = text.replace(/^﻿/, '');
  const rows = []; let row = [], field = '', inQuotes = false;
  for (let i=0;i<text.length;i++){
    const ch = text[i];
    if (inQuotes){
      if (ch === '"'){ if (text[i+1] === '"'){ field+='"'; i++; } else { inQuotes=false; } }
      else field += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ','){ row.push(field); field=''; }
      else if (ch === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if (ch === '\r'){ /* تجاوز */ }
      else field += ch;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.some(function(c){ return c.trim()!==''; }); });
}
function downloadTextFile(filename, text, mime){
  const blob = new Blob(['﻿'+text], { type: (mime||'text/csv')+';charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}
async function importTeachersFromCsv(text){
  const rows = parseCsv(text);
  if (!rows.length){ toast('الملف فارغ.'); return; }
  let dataRows = rows;
  const first = (rows[0][0]||'').trim();
  if (first === 'الاسم' || first.toLowerCase() === 'name'){ dataRows = rows.slice(1); }
  if (!dataRows.length){ toast('لا توجد بيانات معلمين في الملف.'); return; }

  const existingUsers = await DB.listUsers({});
  const existingUsernames = existingUsers.map(function(u){ return u.username; });
  const created = [];
  for (let i=0;i<dataRows.length;i++){
    const r = dataRows[i];
    const fullName = (r[0]||'').trim();
    const specialty = (r[1]||'').trim();
    const phone = (r[2]||'').trim();
    if (!fullName) continue;
    let base = phone.replace(/[^0-9]/g,'') || 'teacher';
    let candidate = base, n = 1;
    while (existingUsernames.indexOf(candidate) > -1){ candidate = base + '_' + (n++); }
    existingUsernames.push(candidate);
    const password = String(Math.floor(100000 + Math.random()*900000));
    try{
      await DB.createUser({ username:candidate, password:password, full_name:fullName, role:'teacher', school:State.user.school, community_id:null, specialty:specialty, phone:phone });
      created.push({ full_name:fullName, username:candidate, password:password });
    }catch(e){ /* تجاوز السجل المتعارض والمتابعة للسجل التالي */ }
  }
  if (!created.length){ toast('لم يتم استيراد أي معلم، يرجى مراجعة تنسيق الملف.'); return; }
  toast('تم استيراد '+created.length+' معلمًا بنجاح. سيتم تنزيل بيانات الدخول الخاصة بهم.');
  const credRows = [['الاسم','اسم المستخدم','كلمة المرور']].concat(created.map(function(c){ return [c.full_name, c.username, c.password]; }));
  downloadTextFile('بيانات_دخول_المعلمين_المستوردين.csv', toCsv(credRows));
  render(); bindAdminUsers();
}

async function screenIndicators(){
  const subs = await DB.listSubmissions({ school: State.user.school });
  const settings = (await DB.getSettings(State.user.school)) || {};
  const indStatus = await DB.getIndicatorStatus(State.user.school);
  const semesterStart = settings.semester_start || settings.semesterStart || '';
  const curWeek = currentWeekNumber(semesterStart);

  const settingsBar = (
    '<div class="settings-bar no-print">' +
      '<label>تاريخ بداية الفصل الدراسي الثاني:</label>' +
      '<input type="date" id="semesterStartInput" value="'+esc(semesterStart)+'">' +
      '<button class="btn btn-primary btn-sm" data-action="saveSemesterStart">حفظ</button>' +
      (curWeek!=null
        ? '<span class="prog-txt" style="margin-right:auto;">الأسبوع الدراسي الحالي: '+curWeek+'</span>'
        : '<span class="prog-txt" style="margin-right:auto;">حدّد تاريخ البداية لحساب الأسبوع الحالي تلقائيًا.</span>') +
    '</div>'
  );

  const programsHtml = PROGRAM_DEFS.map(function(prog){
    const rows = indicatorsForProgram(prog.id).map(function(ind){
      const def = ind.formType ? formDef(ind.formType) : null;
      let doneCount = 0, pendingCount = 0, percent = 0, manualDone = false;
      if (ind.formType){
        doneCount = subs.filter(function(s){ return s.form_type===ind.formType && s.status==='approved'; }).length;
        pendingCount = subs.filter(function(s){ return s.form_type===ind.formType && s.status==='pending'; }).length;
        percent = ind.targetCount ? Math.min(100, Math.round(doneCount/ind.targetCount*100)) : (doneCount>0?100:0);
      } else {
        manualDone = !!(indStatus[ind.id] && indStatus[ind.id].done);
      }
      const timeStatus = indicatorTimeStatus(ind, curWeek, ind.formType ? doneCount : (manualDone?1:0), ind.formType ? ind.targetCount : 1);
      const sideAction = ind.formType
        ? (State.user.role==='coordinator'
            ? '<button class="btn btn-ghost btn-sm" data-action="quickCreateIndicator" data-form="'+ind.formType+'">+ إنشاء '+esc(def.title)+'</button>'
            : '')
        : '<label class="chk '+(manualDone?'checked':'')+'" style="font-size:11.5px;"><input type="checkbox" data-action="toggleIndicatorDone" data-id="'+ind.id+'" '+(manualDone?'checked':'')+'> أُنجز</label>';
      const progressHtml = ind.formType
        ? ('<div class="prog-bar"><i style="width:'+percent+'%;"></i></div><span class="prog-txt">'+doneCount+(ind.targetCount?('/'+ind.targetCount):'')+(pendingCount?(' · '+pendingCount+' بانتظار الاعتماد'):'')+'</span>')
        : '';
      return (
        '<div class="ind-row">' +
          '<div class="ind-main">' +
            '<div class="lbl">'+esc(ind.label)+'</div>' +
            '<div class="sub">تنفيذ: '+esc(ind.execResp)+' · متابعة: '+esc(ind.followResp)+' · '+esc(indicatorPeriodLabel(ind))+
              (def?' · النموذج: '+esc(def.title):'') + (ind.note?' · '+esc(ind.note):'') +
            '</div>' +
          '</div>' +
          '<div class="ind-side">' +
            '<span class="badge '+TIME_STATUS_BADGE[timeStatus]+'">'+TIME_STATUS_LABEL[timeStatus]+'</span>' +
            progressHtml +
            sideAction +
          '</div>' +
        '</div>'
      );
    }).join('');
    return (
      '<div class="program-card">' +
        '<div class="ph"><h3>'+esc(prog.title)+(prog.subtitle?' <span style="color:var(--muted);font-weight:400;font-size:12px;">('+esc(prog.subtitle)+')</span>':'')+'</h3><p>'+esc(prog.goal)+'</p></div>' +
        rows +
      '</div>'
    );
  }).join('');

  return settingsBar + programsHtml;
}

/* ----- شريط الحالة (Stepper) ----- */
function statusStrip(status){
  const steps = [
    { key:'draft', label:'إعداد' },
    { key:'pending', label:'إرسال للاعتماد' },
    { key:'approved', label:'اعتماد مدير المدرسة' }
  ];
  let activeIdx = steps.findIndex(function(s){ return s.key===status; });
  if (status==='returned') activeIdx = 1;
  return '<div class="status-strip no-print">' + steps.map(function(s, i){
    let cls = '';
    if (status==='returned' && i===1) cls = 'now';
    else if (i < activeIdx) cls='done';
    else if (i === activeIdx) cls='now';
    return (i>0?'<div class="step-sep"></div>':'') + '<div class="step '+cls+'"><span class="c">'+(i+1)+'</span><span>'+s.label+'</span></div>';
  }).join('') + '</div>';
}

/* ----- محرّر النموذج ----- */
function screenEditor(){
  const def = formDef(EditorState.formType);
  const readonly = false;
  let body = '';
  switch(EditorState.formType){
    case 'groupPlan': body = renderGroupPlan(EditorState.data, readonly); break;
    case 'indicatorReport': body = renderIndicatorReport(EditorState.data, readonly); break;
    case 'individualAgreement': body = renderIndividualAgreement(EditorState.data, readonly); break;
    case 'modelLesson': body = renderModelLesson(EditorState.data, readonly); break;
    case 'plcMeetingMinutes': body = renderPlcMeeting(EditorState.data, readonly); break;
    case 'motivationInitiative': body = renderMotivation(EditorState.data, readonly); break;
  }

  const returnBox = EditorState.status==='returned' && EditorState.returnComment
    ? '<div class="return-note"><b>أُعيد النموذج للتعديل من مدير المدرسة:</b>'+esc(EditorState.returnComment)+'</div>' : '';

  const sigBlock = (
    '<div class="sig-footer">' +
      '<div><div class="who">توقيع المُعد ('+esc(State.user.full_name)+')</div>' +
        (EditorState.prepSig ? '<div class="signed-chip">✓ تم التوقيع</div><div style="margin-top:8px;">'+buildSignaturePad('preparer', EditorState.prepSig, true)+'</div><button class="btn btn-ghost btn-sm" style="margin-top:8px;" data-action="resign">إعادة التوقيع</button>'
          : buildSignaturePad('preparer', null, false)) +
      '</div>' +
    '</div>'
  );

  return (
    '<div class="sheet-wrap">' +
      '<div class="sheet-bar no-print">' +
        '<div class="left"><button class="btn btn-ghost btn-sm" data-action="back">‹ رجوع</button><span class="badge '+EditorState.status+'">'+STATUS_LABEL[EditorState.status]+'</span></div>' +
        '<div></div>' +
      '</div>' +
      statusStrip(EditorState.status) +
      returnBox +
      '<div class="form-sheet">' +
        '<div class="sheet-header"><div class="titles"><h1>'+esc(def.title)+'</h1><div class="sub">دعم التحصيل الدراسي — '+esc(EditorState.school)+'</div></div><div class="form-no">نموذج رقم ('+def.no+')</div></div>' +
        body +
        sigBlock +
        '<div class="footer-note">يُحفظ هذا النموذج إلكترونيًا ويُحال إلى مدير المدرسة للاعتماد النهائي.</div>' +
      '</div>' +
      '<div class="sheet-bar no-print" style="margin-top:16px;justify-content:flex-end;gap:10px;">' +
        '<button class="btn btn-ghost" data-action="saveDraft">حفظ كمسودة</button>' +
        '<button class="btn btn-primary" data-action="submitForm">إرسال لاعتماد مدير المدرسة</button>' +
      '</div>' +
    '</div>'
  );
}

/* ---------------------- ربط أحداث المحرّر ---------------------- */
function getPath(obj, path){
  const parts = path.split('.'); let cur = obj;
  for (let i=0;i<parts.length;i++){ if (cur==null) return undefined; cur = cur[parts[i]]; }
  return cur;
}
function setPath(obj, path, value){
  const parts = path.split('.'); let cur = obj;
  for (let i=0;i<parts.length-1;i++){
    const key = parts[i];
    if (cur[key]===undefined) cur[key] = (/^\d+$/.test(parts[i+1]) ? [] : {});
    cur = cur[key];
  }
  cur[parts[parts.length-1]] = value;
}
function defaultRowFor(list){
  switch(list){
    case 'students': return blankStudentRow();
    case 'participants': return { name:'', spec:'' };
    case 'sessions': return blankSession();
    case 'positives': return '';
    case 'attendees': return { name:'', spec:'', present:true };
    case 'agenda': return '';
    case 'decisions': return { decision:'', responsible:'', deadline:'' };
    case 'impacts': return { indicator:'', baseline:'', target:'', actual:'' };
    default: return {};
  }
}

function bindEditor(){
  document.querySelectorAll('[data-field]').forEach(function(el){
    const evt = (el.tagName==='SELECT') ? 'change' : 'input';
    el.addEventListener(evt, function(){ setPath(EditorState.data, el.getAttribute('data-field'), el.value); });
  });
  document.querySelectorAll('[data-action="toggleChk"]').forEach(function(el){
    el.addEventListener('change', function(){
      const group = el.getAttribute('data-group'); const val = el.getAttribute('data-val');
      let arr = getPath(EditorState.data, group) || [];
      arr = el.checked ? arr.concat([val]) : arr.filter(function(v){ return v!==val; });
      setPath(EditorState.data, group, arr);
      render(); bindEditor();
    });
  });
  document.querySelectorAll('[data-action="setRadio"]').forEach(function(el){
    el.addEventListener('change', function(){
      setPath(EditorState.data, el.getAttribute('data-group'), el.getAttribute('data-val'));
      render(); bindEditor();
    });
  });
  document.querySelectorAll('[data-action="toggleAttend"]').forEach(function(el){
    el.addEventListener('change', function(){ EditorState.data.attendees[+el.getAttribute('data-idx')].present = el.checked; });
  });
  document.querySelectorAll('[data-action="addRow"]').forEach(function(el){
    el.addEventListener('click', function(){
      const list = el.getAttribute('data-list');
      EditorState.data[list] = (EditorState.data[list]||[]).concat([ defaultRowFor(list) ]);
      render(); bindEditor();
    });
  });
  document.querySelectorAll('[data-action="removeRow"]').forEach(function(el){
    el.addEventListener('click', function(){
      const list = el.getAttribute('data-list'); const idx = +el.getAttribute('data-idx');
      EditorState.data[list].splice(idx,1);
      render(); bindEditor();
    });
  });
  document.querySelectorAll('[data-action="clearPad"]').forEach(function(el){
    el.addEventListener('click', function(){ clearPad(el.getAttribute('data-pad')); });
  });
  const resign = document.querySelector('[data-action="resign"]');
  if (resign) resign.addEventListener('click', function(){ EditorState.prepSig=null; render(); bindEditor(); });

  document.querySelector('[data-action="back"]').addEventListener('click', function(){ go('dashboard'); });
  document.querySelector('[data-action="saveDraft"]').addEventListener('click', async function(){ await persistEditor('draft'); });
  document.querySelector('[data-action="submitForm"]').addEventListener('click', async function(){ await persistEditor('pending'); });
}

async function persistEditor(targetStatus){
  if (targetStatus==='pending'){
    const padKey = 'pad_preparer';
    const pad = Pads[padKey];
    const hasNewSig = pad && !pad.isEmpty();
    if (!EditorState.prepSig && !hasNewSig){
      toast('يرجى التوقيع قبل إرسال النموذج للاعتماد.'); return;
    }
    if (hasNewSig) EditorState.prepSig = pad.toDataUrl();
  } else {
    const pad = Pads['pad_preparer'];
    if (pad && !pad.isEmpty()) EditorState.prepSig = pad.toDataUrl();
  }

  const payload = {
    form_type: EditorState.formType, school: EditorState.school,
    created_by: EditorState.createdBy, created_by_name: EditorState.createdByName,
    payload: EditorState.data, status: targetStatus, preparer_signature: EditorState.prepSig,
    principal_signature: EditorState.principalSig, principal_comment: targetStatus==='pending' ? null : EditorState.returnComment,
    submitted_at: targetStatus==='pending' ? nowIso() : null, approved_at: EditorState.approved_at || null
  };
  try{
    if (EditorState.id){ await DB.updateSubmission(EditorState.id, payload); }
    else { const created = await DB.createSubmission(payload); EditorState.id = created.id; }
    toast(targetStatus==='pending' ? 'تم إرسال النموذج إلى مدير المدرسة للاعتماد.' : 'تم حفظ المسودة بنجاح.');
    go('dashboard');
  }catch(e){ toast(e.message); }
}

/* ---------------------- شاشة العرض (قراءة فقط) ---------------------- */
let ViewCache = {};
async function screenView(id){
  const s = await DB.getSubmission(id); ViewCache = s;
  const def = formDef(s.form_type);
  let body = '';
  switch(s.form_type){
    case 'groupPlan': body = renderGroupPlan(s.payload, true); break;
    case 'indicatorReport': body = renderIndicatorReport(s.payload, true); break;
    case 'individualAgreement': body = renderIndividualAgreement(s.payload, true); break;
    case 'modelLesson': body = renderModelLesson(s.payload, true); break;
    case 'plcMeetingMinutes': body = renderPlcMeeting(s.payload, true); break;
    case 'motivationInitiative': body = renderMotivation(s.payload, true); break;
  }
  const stamp = s.status==='approved' ? (
    '<div class="stamp"><div><div class="txt">معتمد</div><div class="sm">'+ (s.approved_at? new Date(s.approved_at).toLocaleDateString('ar-SA'): '') +'</div></div></div>'
  ) : '';
  return (
    '<div class="sheet-wrap">' +
      '<div class="sheet-bar no-print"><button class="btn btn-ghost btn-sm" data-action="back">‹ رجوع</button>' +
        '<span style="display:flex;gap:8px;">' +
        '<button class="btn btn-ghost btn-sm" data-action="printForm">طباعة</button>' +
        '<button class="btn btn-gold btn-sm" data-action="exportPdf" data-filename="'+esc(def.title)+'">تصدير PDF</button>' +
        '</span></div>' +
      statusStrip(s.status) +
      '<div class="form-sheet">' + stamp +
        '<div class="sheet-header"><div class="titles"><h1>'+esc(def.title)+'</h1><div class="sub">دعم التحصيل الدراسي — '+esc(s.school)+'</div></div><div class="form-no">نموذج رقم ('+def.no+')</div></div>' +
        body +
        '<div class="sig-footer">' +
          '<div><div class="who">توقيع المُعد: '+esc(s.created_by_name)+'</div>'+buildSignaturePad('v_prep', s.preparer_signature, true)+'</div>' +
          '<div><div class="who">اعتماد مدير المدرسة</div>'+buildSignaturePad('v_principal', s.principal_signature, true)+(s.approved_at?'<div style="font-size:11.5px;color:var(--muted);margin-top:6px;">اعتُمد بتاريخ '+fmtDateTime(s.approved_at)+'</div>':'')+'</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}
function bindView(){
  document.querySelector('[data-action="back"]').addEventListener('click', function(){ go('dashboard'); });
  document.querySelector('[data-action="printForm"]').addEventListener('click', function(){ window.print(); });
  document.querySelector('[data-action="exportPdf"]').addEventListener('click', function(e){ exportFormToPdf(e.currentTarget.getAttribute('data-filename')); });
}

/* ---------------------- شاشة مراجعة مدير المدرسة ---------------------- */
let ReviewCache = {};
async function screenReview(id){
  const s = await DB.getSubmission(id); ReviewCache = s;
  const def = formDef(s.form_type);
  let body = '';
  switch(s.form_type){
    case 'groupPlan': body = renderGroupPlan(s.payload, true); break;
    case 'indicatorReport': body = renderIndicatorReport(s.payload, true); break;
    case 'individualAgreement': body = renderIndividualAgreement(s.payload, true); break;
    case 'modelLesson': body = renderModelLesson(s.payload, true); break;
    case 'plcMeetingMinutes': body = renderPlcMeeting(s.payload, true); break;
    case 'motivationInitiative': body = renderMotivation(s.payload, true); break;
  }
  return (
    '<div class="sheet-bar no-print"><div style="display:flex;gap:8px;align-items:center;"><button class="btn btn-ghost btn-sm" data-action="back">‹ رجوع</button><span class="badge '+s.status+'">'+STATUS_LABEL[s.status]+'</span></div>' +
      '<button class="btn btn-gold btn-sm" data-action="exportPdf" data-filename="'+esc(def.title)+'">تصدير PDF</button></div>' +
    '<div class="layout-2col">' +
      '<div class="form-sheet">' +
        '<div class="sheet-header"><div class="titles"><h1>'+esc(def.title)+'</h1><div class="sub">إعداد: '+esc(s.created_by_name)+'</div></div><div class="form-no">نموذج رقم ('+def.no+')</div></div>' +
        body +
        '<div class="sig-footer"><div><div class="who">توقيع المُعد</div>'+buildSignaturePad('rv_prep', s.preparer_signature, true)+'</div></div>' +
      '</div>' +
      '<div class="review-panel no-print">' +
        '<h3>اعتماد مدير المدرسة</h3>' +
        '<div class="review-grid">' +
          '<div class="field"><label>ملاحظات (مطلوبة عند الإرجاع)</label><textarea class="input" id="reviewComment" placeholder="اكتب سبب الإرجاع أو أي ملاحظة..."></textarea></div>' +
          '<div class="field"><label>التوقيع الإلكتروني لمدير المدرسة</label>' + buildSignaturePad('approve', null, false) + '</div>' +
          '<button class="btn btn-gold btn-block" data-action="approveSub">✓ اعتماد وختم النموذج</button>' +
          '<button class="btn btn-danger btn-block" data-action="returnSub">إرجاع للتعديل</button>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}
function bindReview(){
  document.querySelector('[data-action="back"]').addEventListener('click', function(){ go('dashboard'); });
  document.querySelector('[data-action="exportPdf"]').addEventListener('click', function(e){ exportFormToPdf(e.currentTarget.getAttribute('data-filename')); });
  document.querySelectorAll('[data-action="clearPad"]').forEach(function(el){
    el.addEventListener('click', function(){ clearPad(el.getAttribute('data-pad')); });
  });
  document.querySelector('[data-action="approveSub"]').addEventListener('click', async function(){
    const pad = Pads['pad_approve'];
    if (!pad || pad.isEmpty()){ toast('يرجى التوقيع لاعتماد النموذج.'); return; }
    try{
      await DB.updateSubmission(ReviewCache.id, { status:'approved', principal_signature: pad.toDataUrl(), approved_at: nowIso(), principal_comment:null });
      toast('تم اعتماد النموذج بختم رسمي.');
      go('view', { id: ReviewCache.id });
    }catch(e){ toast(e.message); }
  });
  document.querySelector('[data-action="returnSub"]').addEventListener('click', async function(){
    const comment = document.getElementById('reviewComment').value.trim();
    if (!comment){ toast('يرجى كتابة ملاحظة توضح سبب الإرجاع.'); return; }
    try{
      await DB.updateSubmission(ReviewCache.id, { status:'returned', principal_comment: comment });
      toast('تم إرجاع النموذج للمُعد للتعديل.');
      go('dashboard');
    }catch(e){ toast(e.message); }
  });
}

/* ---------------------- أحداث عامة (نَقر على بطاقات اللوحة) ---------------------- */
function bindGlobalAction(el){
  const action = el.getAttribute('data-action');
  if (action==='goPicker'){ el.addEventListener('click', function(){ go('picker'); }); }
  else if (action==='openEdit'){ el.addEventListener('click', async function(){ const s = await DB.getSubmission(el.getAttribute('data-id')); openEditor(s.form_type, s); }); }
  else if (action==='openView'){ el.addEventListener('click', function(){ go('view', { id: el.getAttribute('data-id') }); }); }
  else if (action==='openReview'){ el.addEventListener('click', function(){ go('review', { id: el.getAttribute('data-id') }); }); }
  else if (action==='dashTab'){ el.addEventListener('click', function(){ State.dashTab = el.getAttribute('data-tab'); go('dashboard'); }); }
  else if (action==='adminTab'){ el.addEventListener('click', function(){ State.adminTab = el.getAttribute('data-tab'); go('dashboard'); }); }
}

/* ---------------------- نقطة الانطلاق ---------------------- */
(function init(){
  loadAuth();
  const u = loadUserSession();
  if (u){ State.user = u; go('dashboard'); }
  else { go('login'); }
})();
</script>
